{% extends "workshop_app/base.html" %}

{% block title %}Password Changed — FOSSEE{% endblock %}

{% block content %}
<div class="page-container" style="max-width:440px;padding-top:64px;padding-bottom:64px;text-align:center">

  <div style="font-size:48px;color:var(--success);margin-bottom:16px" aria-hidden="true">
    <i class="fa fa-check-circle"></i>
  </div>
  <h1 class="page-heading">Password changed</h1>
  <p style="color:var(--text-secondary);margin-bottom:8px">
    Your password has been updated successfully.
  </p>
  <p style="font-size:13px;color:var(--text-muted);margin-bottom:28px">
    Redirecting you to the dashboard…
  </p>
  <a href="{% url 'workshop_app:index' %}" class="btn btn-primary">Go to dashboard</a>
  <script>setTimeout(function(){ location.href="{% url 'workshop_app:index' %}"; }, 2000);</script>

</div>
{% endblock %}
