{% extends "workshop_app/base.html" %}

{% block title %}Password Reset Complete — FOSSEE{% endblock %}

{% block content %}
<div class="page-container" style="max-width:440px;padding-top:64px;padding-bottom:64px;text-align:center">

  <div style="font-size:48px;color:var(--success);margin-bottom:16px" aria-hidden="true">
    <i class="fa fa-check-circle"></i>
  </div>
  <h1 class="page-heading">Password reset complete</h1>
  <p style="color:var(--text-secondary);margin-bottom:28px">
    Your password has been set. You can now sign in with your new password.
  </p>
  <a href="{% url 'workshop_app:login' %}" class="btn btn-primary btn-lg">Sign in</a>

</div>
{% endblock %}
